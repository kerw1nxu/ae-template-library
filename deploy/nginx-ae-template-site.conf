limit_req_zone $binary_remote_addr zone=ae_template_api:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=ae_template_download:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=ae_template_conn:10m;

server {
  listen 80;
  server_name _;

  client_max_body_size 4096m;

  location /api/templates/ {
    limit_req zone=ae_template_api burst=20 nodelay;
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/api/templates/.+/download$ {
    limit_req zone=ae_template_download burst=5 nodelay;
    limit_conn ae_template_conn 2;
    limit_rate_after 20m;
    limit_rate 8m;
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /media/ {
    limit_conn ae_template_conn 6;
    limit_rate_after 10m;
    limit_rate 6m;
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    limit_req zone=ae_template_api burst=40 nodelay;
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
